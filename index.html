<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="Glider.js-master/glider.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="/img/wewed.png" type="image/x-icon" />
    <title>Wewed</title>
  </head>
  <body>
    <div class="wrapper">
      <section class="pertama-section">
        <header class="hero-container">
          <div class="pertama">
            <h1>Happy</h1>
            <h1>Anniversary</h1>
            <h1>Widya</h1>
          </div>
          <div class="wewed">
            <img src="/img/wewed.png" alt="" />
          </div>

          <img class="bg" src="img/bg.svg" alt="" />
          <img class="bg-mobile" src="img/bg-mobile.svg" alt="" />

          <div class="circle-container">
            <img class="circle" src="img/circle.svg" alt="" />
          </div>
        </header>
      </section>

      <section class="kedua-section">
        <div class="kedua-content">
          <div data-aos="fade-right" data-aos-duration="1000" class="ketiga">
            <img src="/img/apk.svg" alt="" />
          </div>

          <div data-aos="zoom-in" data-aos-duration="1500">
            <p>Berawal dari aplikasi</p>
            <p>Berujung berinteraksi</p>
          </div>
        </div>
      </section>

      <section class="ketiga-section">
        <div class="ketiga-content">
          <div data-aos="fade-right" data-aos-duration="2000" class="ketiga">
            <p>14 Desember 2019</p>
            <p>Hari dimana kita resmi berpacaran</p>
          </div>

          <img class="bg2" src="/img/bg2.png" alt="" />
        </div>
      </section>

      <section class="keempat-section">
        <div class="keempat-content">
          <div data-aos="fade-right" data-aos-duration="1000" class="keempat">
            <img class="gandeng" src="/img/gandeng.svg" alt="" />
          </div>

          <div data-aos="zoom-in" data-aos-duration="1000">
            <p>14 Desember 2021</p>
            <p>Tak terasa sudah 2 tahun kita bersama</p>
          </div>
        </div>
      </section>
      <img src="/img/bg3.svg" alt="" class="bg3" />
    </div>
  </body>
</html>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="main.js"></script>
<script>
  AOS.init();
</script>
